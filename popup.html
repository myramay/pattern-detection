<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dark Pattern Detector</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      background: #111;
      color: #e0e0e0;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 13px 16px;
      background: #1a1a1a;
      border-bottom: 2px solid #FFD700;
    }
    header .icon { font-size: 18px; }
    header h1 {
      font-size: 14px;
      font-weight: 600;
      color: #FFD700;
      letter-spacing: 0.2px;
    }

    #content { padding: 4px 0 8px; }

    .summary {
      padding: 10px 16px 12px;
      font-size: 12px;
      color: #666;
      border-bottom: 1px solid #1e1e1e;
    }
    .summary.warn {
      color: #FFD700;
      font-weight: 500;
    }
    .summary.clean { color: #5a9; }

    ul.list { list-style: none; }
    ul.list li {
      display: flex;
      align-items: center;
      padding: 9px 16px;
      gap: 10px;
      border-bottom: 1px solid #1a1a1a;
    }
    ul.list li:hover { background: #161616; }
    ul.list li.found  { color: #e8e8e8; }
    ul.list li:not(.found) { color: #444; }

    .emoji { font-size: 14px; width: 20px; text-align: center; flex-shrink: 0; }
    .label { flex: 1; }

    .count {
      font-size: 11px;
      font-weight: 700;
      min-width: 22px;
      text-align: center;
      border-radius: 10px;
      padding: 2px 6px;
    }
    .count.badge { background: #FFD700; color: #111; }
    .count.zero  { color: #333; }

    .error, #loading {
      padding: 20px 16px;
      text-align: center;
      color: #555;
      font-size: 12px;
      line-height: 1.6;
    }

    footer {
      padding: 8px 16px;
      font-size: 10px;
      color: #2a2a2a;
      text-align: center;
      border-top: 1px solid #1a1a1a;
    }
  </style>
</head>
<body>
  <header>
    <span class="icon">⚠</span>
    <h1>Dark Pattern Detector</h1>
  </header>
  <div id="content">
    <p id="loading">Scanning page…</p>
  </div>
  <footer>Fully client-side · No external requests</footer>
  <script src="popup.js"></script>
</body>
</html>
